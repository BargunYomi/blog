<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>homepage</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="page">

  <header class="site-header">
    <h1>oscar indigo</h1>
    <p>whatever</p>
  </header>

  <div class="navbar">
    <a href="index.html" class="active">- home -</a>
    <a href="blog.html">- blog -</a>
    <a href="music.html">- music -</a>
  </div>

  <div class="content-area">

    <!-- MAIN CONTENT -->
    <div class="main-content">

      <div class="section-header">about</div>

      <p style="font-size:13px; margin-bottom:10px;">
        no
      </p>

      <hr>

      <div class="section-header">latest posts</div>

      <ul class="post-list" id="post-list"></ul>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="sidebar-box">
        <div class="sidebar-box-title">&#9658; music song</div>

        <div class="sidebar-box-content">

          <em>
            Neutral Milk Hotel <br>
            In the Aeroplane over the Sea
          </em><br>

          <strong>Communist Daughter</strong>

          <audio id="bg-music">
            <source src="Communist-Daughter.mp3" type="audio/mpeg">
          </audio>

          <button id="play-btn">▶ play</button>

          <div class="controls">
            <input type="range" id="seek" value="0" min="0" max="100">
          </div>

          <div class="controls">
            <label style="font-size:11px;">volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.1">
          </div>

        </div>
      </div>

    </div>

  </div>

  

</div>

<div class="post-popup" id="post-popup">

  <div class="site-header popup-header">

    <h1 style="font-size:14px; margin:0;">
      hello from bulgaria
    </h1>

    <div class="popup-controls">
      <div class="window-minimize" onclick="toggleMinimize()">—</div>
      <div class="window-close" onclick="closePost()">×</div>
    </div>

  </div>

  <div class="popup-body" id="popup-body">

    <p>
      this is the full blog post content.
    </p>

  </div>




<script>
  const audio = document.getElementById("bg-music");
  const btn = document.getElementById("play-btn");
  const seek = document.getElementById("seek");
  const volume = document.getElementById("volume");

  // set default volume from slider
  audio.volume = parseFloat(volume.value);

  let isPlaying = false;

  // PLAY / PAUSE
  btn.addEventListener("click", () => {
    if (!isPlaying) {
      audio.play();
      btn.textContent = "⏸ pause";
    } else {
      audio.pause();
      btn.textContent = "▶ play";
    }

    isPlaying = !isPlaying;
  });

  audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
      seek.value = (audio.currentTime / audio.duration) * 100;
    }
  });

  seek.addEventListener("input", () => {
    audio.currentTime = (seek.value / 100) * audio.duration;
  });

  volume.addEventListener("input", () => {
    audio.volume = parseFloat(volume.value);
  });
</script>
<script>
let postsData = [];

const list = document.getElementById("post-list");
const popup = document.getElementById("post-popup");
const body = document.getElementById("popup-body");
const page = document.querySelector(".page");

fetch("posts.json")
  .then(res => res.json())
  .then(posts => {
    console.log("POSTS LOADED:", posts);
    postsData = posts;
    renderPosts(postsData);
  })
  .catch(err => console.error("FETCH ERROR:", err));

function renderPosts(posts) {
  list.innerHTML = "";

  const latestPosts = [...posts]
    .sort((a, b) => b.id - a.id) // highest ID first
    .slice(0, 3);

  latestPosts.forEach(post => {
    const li = document.createElement("li");

    li.innerHTML = `
      <h2>
        <a href="#" onclick="openPost(${post.id})">${post.title}</a>
      </h2>
      <p class="post-meta">
        posted: ${post.date} | category: ${post.category}
      </p>
      <p class="post-excerpt">${post.excerpt}</p>
    `;

    list.appendChild(li);
  });
}

function openPost(id) {
  const post = postsData.find(p => p.id === id);

  body.innerHTML = `
    <h2>${post.title}</h2>
    <p><em>${post.date} | ${post.category}</em></p>
    <p>${post.content}</p>
  `;

  popup.classList.add("open");

  page.style.transform = "translateX(-400px)";
  page.style.transition = "transform 0.3s ease";
}

function closePost() {
  popup.classList.remove("open");

  page.style.transform = "translateX(0px)";
}
</script>


</body>
</html>
